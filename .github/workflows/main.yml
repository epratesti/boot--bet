name: Bot de Apostas Diario

on:
  schedule:
    - cron: '0 12,15,18,21 * * *' # Roda às 09h, 12h, 15h e 18h (Horário de Brasília)
  workflow_dispatch: # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4  # Atualizado de v3 para v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Atualizado de v4 para v5
        with:
          python-version: '3.11' # Versão mais estável atual

      - name: Instalar Dependências
        run: pip install requests

      - name: Executar Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_apostas.py
